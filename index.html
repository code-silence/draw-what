<!DOCTYPE html>
<html lang="en">
<head>
    <title>SketchGuess</title>
</head>
<body>

<h1>SketchGuess</h1>

<input required
    id="nameInput"
    placeholder="Your name"
>

<button id="continueBtn">
    Continue
</button>

<script>

document
.getElementById("continueBtn")
.addEventListener("click", () => {

    const name =
        document
        .getElementById("nameInput")
        .value;

    localStorage.setItem(
        "playerName",
        name
    );

    location.href =
        "lobby.html";
});

</script>

</body>
</html>
